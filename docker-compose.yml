services:
  # ── Data Stores ────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bookiebreaker
      POSTGRES_USER: bookiebreaker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookiebreaker -d bookiebreaker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bookiebreaker

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bookiebreaker

  # ── Application Services ───────────────────────────────
  # Service role passwords are the literal "localdev" from
  # init-db/04-create-roles.sql; POSTGRES_PASSWORD only rotates the
  # bookiebreaker superuser.
  lines-service:
    build:
      context: ../bookie-breaker-lines-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgres://lines_svc:localdev@postgres:5432/bookiebreaker?search_path=lines,public
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      ODDS_API_SPORTS: ${ODDS_API_SPORTS:-basketball_nba}
      ODDS_API_POLL_INTERVAL: ${ODDS_API_POLL_INTERVAL:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/api/v1/lines/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  statistics-service:
    build:
      context: ../bookie-breaker-statistics-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgres://statistics_svc:localdev@postgres:5432/bookiebreaker?search_path=public
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      INJURY_SOURCE: ${INJURY_SOURCE:-espn}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/api/v1/stats/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  # python:slim images have no wget/curl, hence the python healthchecks
  simulation-engine:
    build:
      context: ../bookie-breaker-simulation-engine
    ports:
      - "8003:8003"
    environment:
      REDIS_URL: redis://redis:6379
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      SIMULATION_ITERATIONS: ${SIMULATION_ITERATIONS:-10000}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://localhost:8003/api/v1/sim/health')
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  prediction-engine:
    build:
      context: ../bookie-breaker-prediction-engine
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgres://predictions_svc:localdev@postgres:5432/bookiebreaker?search_path=predictions,public
      REDIS_URL: redis://redis:6379
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      LINES_SERVICE_URL: http://lines-service:8001
      SIMULATION_SERVICE_URL: http://simulation-engine:8003
      MODEL_DIR: /models
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # bootstrap model is baked into the image; the volume persists
      # retrained artifacts across container recreation
      - prediction-models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lines-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      simulation-engine:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://localhost:8004/api/v1/predict/health')
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - bookiebreaker

  bookie-emulator:
    build:
      context: ../bookie-breaker-bookie-emulator
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgres://emulator_svc:localdev@postgres:5432/bookiebreaker?search_path=emulator,public
      REDIS_URL: redis://redis:6379
      LINES_SERVICE_URL: http://lines-service:8001
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lines-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://localhost:8005/api/v1/emulator/health')
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  agent:
    build:
      context: ../bookie-breaker-agent
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgres://agent_svc:localdev@postgres:5432/bookiebreaker?search_path=agent,public
      REDIS_URL: redis://redis:6379
      LINES_SERVICE_URL: http://lines-service:8001
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      SIMULATION_ENGINE_URL: http://simulation-engine:8003
      PREDICTION_ENGINE_URL: http://prediction-engine:8004
      BOOKIE_EMULATOR_URL: http://bookie-emulator:8005
      # LLM provider (ADR-011): compose defaults to the local Ollama for
      # zero-cost dev; set LLM_PROVIDER=anthropic + ANTHROPIC_API_KEY in
      # .env for cloud models. No depends_on ollama: the agent serves with
      # LLM features degraded while Ollama starts or pulls its model.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-phi3:mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lines-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      simulation-engine:
        condition: service_healthy
      prediction-engine:
        condition: service_healthy
      bookie-emulator:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://localhost:8006/api/v1/agent/health')
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  mcp-server:
    build:
      context: ../bookie-breaker-mcp-server
    ports:
      - "8007:8007"
    environment:
      MCP_TRANSPORT: http
      AGENT_URL: http://agent:8006
      LINES_SERVICE_URL: http://lines-service:8001
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      SIMULATION_ENGINE_URL: http://simulation-engine:8003
      PREDICTION_ENGINE_URL: http://prediction-engine:8004
      BOOKIE_EMULATOR_URL: http://bookie-emulator:8005
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      agent:
        condition: service_healthy
      lines-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      simulation-engine:
        condition: service_healthy
      prediction-engine:
        condition: service_healthy
      bookie-emulator:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen('http://localhost:8007/health')
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  ui:
    build:
      context: ../bookie-breaker-ui
    ports:
      - "3000:3000"
    environment:
      # server-side only: the browser talks to the SvelteKit server, which
      # proxies to the internal services (no CORS, no exposed backends)
      AGENT_URL: http://agent:8006
      LINES_SERVICE_URL: http://lines-service:8001
      STATISTICS_SERVICE_URL: http://statistics-service:8002
      SIMULATION_ENGINE_URL: http://simulation-engine:8003
      PREDICTION_ENGINE_URL: http://prediction-engine:8004
      BOOKIE_EMULATOR_URL: http://bookie-emulator:8005
      # live-updates SSE bridge (events:edge.detected, events:bet.graded, ...)
      REDIS_URL: redis://redis:6379
      # adapter-node origin check for form actions
      ORIGIN: ${UI_ORIGIN:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      redis:
        condition: service_healthy
      agent:
        condition: service_healthy
      lines-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      bookie-emulator:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      # node:slim images have no wget/curl; Node >= 18 ships global fetch
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bookiebreaker

  # ── LLM ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "ls"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookiebreaker

  # One-shot model pull (idempotent). Nothing depends on it, so a slow
  # multi-GB pull never blocks `task up`; progress shows in `task logs`.
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-phi3:mini}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - bookiebreaker

  # ── Observability ──────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      prometheus:
        condition: service_started
    networks:
      - bookiebreaker

  prometheus:
    image: prom/prometheus:v2.53.5
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - bookiebreaker

  tempo:
    image: grafana/tempo:2.4.2
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    command:
      - "-config.file=/etc/tempo/config.yaml"
    networks:
      - bookiebreaker

  loki:
    image: grafana/loki:3.0.1
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/config.yaml
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/config.yaml"
    networks:
      - bookiebreaker

  grafana:
    image: grafana/grafana:11.6.16
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - bookiebreaker

volumes:
  postgres-data:
  prediction-models:
  ollama-data:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:

networks:
  bookiebreaker:
    driver: bridge
