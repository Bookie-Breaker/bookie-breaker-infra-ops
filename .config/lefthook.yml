rc: .config/lefthook.rc

pre-commit:
  jobs:
    # === Job 1: Format ===
    - name: format
      group:
        parallel: true
        jobs:
          - name: dockfmt
            glob: "Dockerfile*"
            run: dockfmt fmt {staged_files}
            stage_fixed: true

          - name: prettier
            glob: "*.{json,yaml,yml,md}"
            run: prettier --config .config/prettierrc.json --write {staged_files}
            stage_fixed: true

          - name: shfmt
            glob: "*.{sh,bash,zsh}"
            run: shfmt -w -i 2 -ci -bn {staged_files}
            stage_fixed: true

          - name: taplo-format
            glob: "*.toml"
            run: taplo format --config .config/taplo.toml {staged_files}
            stage_fixed: true

    # === Job 2: Lint ===
    - name: lint
      exclude:
        - .claude/**
        - CLAUDE.md
        - workspace/CLAUDE.md
      group:
        parallel: true
        jobs:
          - name: actionlint
            glob: ".github/workflows/*.{yml,yaml}"
            run: actionlint {staged_files}

          - name: hadolint
            glob: "Dockerfile*"
            run: hadolint {staged_files}

          - name: jsoncheck
            glob: "*.json"
            run: 'python3 -c "import json,sys; [json.load(open(f)) for f in sys.argv[1:]]" {staged_files}'

          - name: markdownlint-cli2
            glob: "*.md"
            run: markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc {staged_files}

          - name: shellcheck
            glob: "*.sh"
            run: shellcheck {staged_files}

          - name: taplo-check
            glob: "*.toml"
            run: taplo check --config .config/taplo.toml {staged_files}

          - name: yamllint
            glob: "*.{yml,yaml}"
            run: yamllint -c .config/yamllint.yml {staged_files}

    # === Job 3: Security ===
    - name: security
      group:
        parallel: true
        jobs:
          - name: gitleaks
            run: gitleaks protect --staged --no-banner

commit-msg:
  commands:
    gitfluff:
      run: gitfluff lint {1}

post-commit:
  commands:
    graphify-notify:
      skip:
        - merge
        - rebase
        - run: test -n "${CI:-}${GITHUB_ACTIONS:-}"
      run: |
        top="$(git rev-parse --show-toplevel)"
        runner="${top}/../bookie-breaker-infra-ops/workspace/scripts/update-graphify.sh"
        if [ -x "$runner" ]; then "$runner" notify "$(basename "$top")" || true; fi

# No pre-push hooks (no test suite in infra-ops repo)
